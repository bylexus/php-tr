services:
    php:
        build:
            context: docker/php
            dockerfile: Dockerfile
        command: ["tail", "-f", "/dev/null"]
        working_dir: /src
        env_file:
            - .env.docker
        volumes:
          - .:/src
    db:
        image: postgres:17
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_HOST_AUTH_METHOD=trust
            - POSTGRES_PASSWORD=${TEST_DATABASE_PASSWORD:-}
            - POSTGRES_USER=${TEST_DATABASE_USER:-postgres}
            - POSTGRES_DB=${TEST_DATABASE_NAME:-postgres}
        volumes:
            - testdb:/var/lib/postgresql/data
    mail:
        image: axllent/mailpit
        ports:
            - "8025:8025"
            - "1025:1025"

volumes:
    testdb: {}
